project:
  type: website
  output-dir: _site
  # In-place migration on branch `docs-quarto`. Sphinx files (conf.py, dingo.*.rst,
  # build/, jupyter_execute/) still live in this directory; the explicit render list
  # below is what makes Quarto ignore them and build only the converted pages.
  render:
    - index.qmd
    - installation.qmd
    - overview.qmd
    - quickstart.qmd
    - example_toy_npe_model.qmd
    - example_npe_model.qmd
    - example_gnpe_model.qmd
    - example_injection.qmd
    - sbi.qmd
    - code_design.qmd
    - generating_waveforms.ipynb
    - waveform_dataset.ipynb
    - training_transforms.ipynb
    - noise_dataset.ipynb
    - network_architecture.ipynb
    - training.qmd
    - inference.qmd
    - gnpe.qmd
    - result.qmd
    - dingo_pipe.qmd
    - asimov.qmd
    - reference/

website:
  title: "Dingo"
  description: "Neural posterior estimation for gravitational-wave inference"
  site-url: "https://dingo-gw.github.io/dingo"
  repo-url: "https://github.com/dingo-gw/dingo"
  # Top navbar: reserved for site-level links (Home, API, source). Docs navigation
  # lives in the left sidebar below, ReadTheDocs-style.
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        file: index.qmd
      - text: "API reference"
        file: reference/index.qmd
    right:
      - icon: github
        href: https://github.com/dingo-gw/dingo
        aria-label: Dingo on GitHub
  # Left sidebar: the full documentation tree, shown on every docs page.
  sidebar:
    style: docked
    collapse-level: 2
    contents:
      - text: "Home"
        file: index.qmd
      - section: "Getting started"
        contents:
          - installation.qmd
          - overview.qmd
          - quickstart.qmd
      - section: "Examples"
        contents:
          - example_toy_npe_model.qmd
          - example_npe_model.qmd
          - example_gnpe_model.qmd
          - example_injection.qmd
      - section: "User guide"
        contents:
          - sbi.qmd
          - code_design.qmd
          - generating_waveforms.ipynb
          - waveform_dataset.ipynb
          - training_transforms.ipynb
          - noise_dataset.ipynb
          - network_architecture.ipynb
          - training.qmd
          - inference.qmd
          - gnpe.qmd
          - result.qmd
          - dingo_pipe.qmd
          - asimov.qmd
      - section: "API reference"
        contents:
          - reference/index.qmd

bibliography: refs.bib

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    code-copy: true
    code-overflow: wrap
    highlight-style: github
    code-block-bg: true
    code-block-border-left: "#2478cc"
    mermaid:
      theme: neutral

execute:
  enabled: false


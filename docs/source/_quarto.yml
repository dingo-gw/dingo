project:
  type: website
  output-dir: _site
  # Explicit render list: pins exactly which pages build, and their order. Now that
  # the old Sphinx files are gone it could be dropped (Quarto would auto-discover all
  # .qmd/.ipynb); kept for now to keep the page set and ordering deterministic.
  render:
    - index.qmd
    - installation.qmd
    - overview.qmd
    - quickstart.qmd
    - example_toy_npe_model.qmd
    - example_npe_model.qmd
    - example_gnpe_model.qmd
    - example_injection.qmd
    - sbi.qmd
    - code_design.qmd
    - generating_waveforms.ipynb
    - waveform_dataset.ipynb
    - training_transforms.ipynb
    - noise_dataset.ipynb
    - network_architecture.ipynb
    - training.qmd
    - inference.qmd
    - gnpe.qmd
    - result.qmd
    - dingo_pipe.qmd
    - asimov.qmd
    - reference/

website:
  title: "Dingo"
  description: "Neural posterior estimation for gravitational-wave inference"
  site-url: "https://dingo-gw.github.io/dingo"
  repo-url: "https://github.com/dingo-gw/dingo"
  # Top navbar: reserved for site-level links (Home, API, source). Docs navigation
  # lives in the left sidebar below, ReadTheDocs-style.
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        file: index.qmd
      - text: "API reference"
        file: reference/index.qmd
    right:
      - icon: github
        href: https://github.com/dingo-gw/dingo
        aria-label: Dingo on GitHub
  # Left sidebar: the full documentation tree, shown on every docs page.
  sidebar:
    style: docked
    collapse-level: 2
    contents:
      - text: "Home"
        file: index.qmd
      - section: "Getting started"
        contents:
          - installation.qmd
          - overview.qmd
          - quickstart.qmd
      - section: "Examples"
        contents:
          - example_toy_npe_model.qmd
          - example_npe_model.qmd
          - example_gnpe_model.qmd
          - example_injection.qmd
      - section: "User guide"
        contents:
          - sbi.qmd
          - code_design.qmd
          - generating_waveforms.ipynb
          - waveform_dataset.ipynb
          - training_transforms.ipynb
          - noise_dataset.ipynb
          - network_architecture.ipynb
          - training.qmd
          - inference.qmd
          - gnpe.qmd
          - result.qmd
          - dingo_pipe.qmd
          - asimov.qmd
      - section: "API reference"
        contents:
          - reference/index.qmd

bibliography: refs.bib

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    code-copy: true
    highlight-style: github
    mermaid:
      theme: neutral

execute:
  enabled: false


name: docs

# Build the Quarto documentation and publish it to GitHub Pages.
#
# This runs ALONGSIDE the existing Sphinx/readthedocs build (dual hosting) during
# the docs migration: it deploys to the `gh-pages` branch and does not touch the
# readthedocs setup (.readthedocs.yaml / conf.py), which keeps serving the old
# Sphinx docs from `main`.
#
# - Pull requests: render only (a build check — catches broken .qmd / render errors).
# - Push to the migration branch / manual dispatch: render AND deploy to gh-pages.
#
# TODO once the migration lands: switch the push trigger below from `docs-quarto`
# to `main`, and retire the readthedocs build.

on:
  push:
    branches: [docs-quarto]
    paths:
      - 'docs/source/**'
      - 'dingo/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/source/**'
      - 'dingo/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write   # publish step pushes the built site to the gh-pages branch

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.38"   # pin to the version the migration was tested against

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Only the API-reference tooling is needed: gen_api.py/build_api.py parse the
      # dingo source statically (via griffe), so torch/numpy are NOT required, and
      # execute is disabled in _quarto.yml so no notebook kernels run here.
      # quartodoc is pinned because build_api.py's __init__-merge hooks its internals.
      - name: Install doc build tooling
        # griffe is pinned too: quartodoc 0.11.1 calls parse_numpy(allow_section_blank_line=...),
        # which newer griffe releases dropped — 1.15.0 is the tested-compatible version.
        run: pip install "quartodoc==0.11.1" "griffe==1.15.0" jupyter

      - name: Generate API reference pages
        working-directory: docs/source
        run: |
          python gen_api.py     # refresh the API object list in _quarto.yml
          python build_api.py   # generate reference/*.qmd (merges __init__ params)

      - name: Render (build check)
        working-directory: docs/source
        run: quarto render

      - name: Publish to gh-pages
        if: github.event_name != 'pull_request'
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs/source
          render: false        # already rendered above
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

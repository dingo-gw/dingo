# Running pytest upon push to main or upon merge request in main

name: Pytest for Dingo-GW

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    name: Pytest for Dingo-GW on Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    runs-on: ubuntu-latest
    env:
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      NUMEXPR_NUM_THREADS: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --extra dev

      - name: Run Pytest
        run: |
          uv run pytest --junit-xml=pytest-report.xml tests/

      - name: Run Asimov integration tests
        run: |
          uv run pytest -m asimov --junit-xml=pytest-asimov-report.xml tests/

      - name: Upload Pytest Report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}.xml
          path: pytest-report.xml
          retention-days: 30

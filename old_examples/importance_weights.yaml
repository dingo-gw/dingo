outdir: .
parameter_samples: ???
num_samples: 1000
event_dataset: null
time_marginalization:
  n_fft: 5
phase_marginalization: null
synthetic_phase: null
calibration_marginalization: null
num_processes: 1

slice_plots:
  num_slice_plots: 10
  params_slice2d:
    - [phase, geocent_time]
    - [phase, tilt_1]

nde:
  path: null
  data:
    parameters: null
  model:
    posterior_model_type: normalizing_flow
    posterior_kwargs:
      num_flow_steps: 10
      base_transform_kwargs:
        hidden_dim: 128
        num_transform_blocks: 2
        activation: elu
        dropout_probability: 0.1
        batch_norm: true
        num_bins: 8
        base_transform_type: rq-coupling
  training:
    device: cpu
    num_workers: 0
    train_fraction: 0.9
    batch_size: 512
    epochs: 20
    optimizer:
      type: adam
      lr: 0.003
    scheduler:
      type: cosine
      T_max: 20

hydra:
  run:
    dir: ${oc.env:DINGO_RUNS}/${now:%Y-%m-%d_%H-%M-%S}_${hydra.job.name}_${hydra.job.override_dirname}
  job:
    name: importance_weights
    chdir: true
    config:
      override_dirname:
        exclude_keys:
          - parameter_samples
          - nde.path

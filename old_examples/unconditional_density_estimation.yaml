result_file: ???
train_dir: nde

data:
  parameters: null

model:
  posterior_model_type: normalizing_flow
  posterior_kwargs:
    num_flow_steps: 10
    base_transform_kwargs:
      hidden_dim: 128
      num_transform_blocks: 2
      activation: elu
      dropout_probability: 0.1
      batch_norm: true
      num_bins: 8
      base_transform_type: rq-coupling

training:
  device: cpu
  num_workers: 0
  train_fraction: 0.9
  batch_size: 512
  epochs: 20
  optimizer:
    type: adam
    lr: 0.003
  scheduler:
    type: cosine
    T_max: 20

hydra:
  run:
    dir: ${oc.env:DINGO_RUNS}/${now:%Y-%m-%d_%H-%M-%S}_${hydra.job.name}_${hydra.job.override_dirname}
  job:
    name: unconditional_density_estimation
    chdir: true
    config:
      override_dirname:
        exclude_keys:
          - result_file

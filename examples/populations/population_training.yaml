data:
  event_embeddings_path: /Users/stephen/Documents/Research/dingo-gw/dingo-devel/experiments_stephen/populations/population_dataset.hdf5
  population_model: power_law
  population_prior:
    minimum_mass: bilby.core.prior.Uniform(minimum=18.0, maximum=30.0)
    maximum_mass: bilby.core.prior.Uniform(minimum=37.0, maximum=47.0)
    hubble_constant: bilby.core.prior.Uniform(minimum=40.0, maximum=140.0)
    alpha: bilby.core.prior.Uniform(minimum=-2.0, maximum=2.0)
    beta: bilby.core.prior.Uniform(minimum=-2.0, maximum=2.0)
  snr_threshold: 12
  minimum_population_size: 10
  maximum_population_size: 20
  size: 5000
  train_fraction: 0.95

model:
  type: population_transformer+nsf
  transformer_kwargs:
    tokenizer:
      hidden_dims: [256, 512, 512]
      batch_norm: False
    transformer:
      d_model: 512
      dim_feedforward: 1024
      nhead: 8
      dropout: 0.1
      num_layers: 6
    final_net:
      hidden_dims: [512, 512, 256, 256, 128, 128]
      output_dim: 128
  nsf_kwargs:
    num_flow_steps: 15
    base_transform_kwargs:
      hidden_dim: 512
      num_transform_blocks: 5
      activation: elu
      dropout_probability: 0.0
      batch_norm: true
      num_bins: 8
      base_transform_type: rq-coupling


training:
  epochs: 50
  batch_size: 2048
  optimizer:
    type: adamw
    lr: 1.0e-4
  scheduler:
    type: sequential
    milestones: [10]
    scheduler_1:
      type: linear
      start_factor: 0.1
      total_iters: 10
    scheduler_2:
      type: cosine
      T_max: 40

local:
  device: cpu
  num_workers: 0
  runtime_limits:
    max_time_per_run: 3600000
    max_epochs_per_run: 500
  checkpoint_epochs: 5

# @package _global_

defaults:
  - override /model: gnpe
  - _self_

data:
  waveform_dataset_path: training_data/waveform_dataset.hdf5
  train_fraction: 0.95
  domain_update:
    f_min: 20.0
    f_max: 1024.0
  svd_size_update: 200
  detectors: [H1, L1]
  ref_time: 1126259462.391
  gnpe_time_shifts:
    kernel: bilby.core.prior.Uniform(minimum=-0.001, maximum=0.001)
    exact_equiv: true
  inference_parameters:
    - chirp_mass
    - mass_ratio
    - a_1
    - a_2
    - tilt_1
    - tilt_2
    - phi_12
    - phi_jl
    - theta_jn
    - luminosity_distance
    - geocent_time
    - ra
    - dec
    - psi

training:
  stage_0:
    epochs: 300
    asd_dataset_path: training_data/asd_dataset_fiducial/asds_O1_fiducial.hdf5
    freeze_rb_layer: true
    batch_size: 4096
    early_stopping: null
    optimizer:
      lr: 5.0e-5
    scheduler:
      T_max: 300
  stage_1:
    epochs: 150
    asd_dataset_path: training_data/asd_dataset/asds_O1.hdf5
    freeze_rb_layer: false
    batch_size: 4096
    early_stopping: null
    optimizer:
      type: adam
      lr: 1.0e-5
    scheduler:
      type: cosine
      T_max: 150

local:
  device: cuda
  num_workers: 32
  runtime_limits:
    max_time_per_run: 3600000
    max_epochs_per_run: 500
  checkpoint_epochs: 10
  leave_waveforms_on_disk: true
  condor:
    num_cpus: 16
    memory_cpus: 128000
    num_gpus: 1
    memory_gpus: 8000
    request_disk: 50GB

# @package _global_

defaults:
  - override /model: gnpe
  - _self_

data:
  waveform_dataset:
    file_name: training_data/waveform_dataset.hdf5
    domain_update:
      f_min: 20.0
      f_max: 1024.0
    svd_size_update: 200
  train_fraction: 0.95
  detectors: [H1, L1]
  ref_time: 1126259462.391
  gnpe_time_shifts:
    _target_: dingo.gw.transforms.GNPECoalescenceTimes
    ifo_list:
      _target_: bilby.gw.detector.InterferometerList
      interferometers: ${data.detectors}
    kernel: bilby.core.prior.Uniform(minimum=-0.001, maximum=0.001)
    exact_global_equivariance: true
    inference: false
  context_parameters:
    - L1_time_proxy_relative
  selected_keys:
    - inference_parameters
    - waveform
    - context_parameters
  inference_parameters:
    - chirp_mass
    - mass_ratio
    - a_1
    - a_2
    - tilt_1
    - tilt_2
    - phi_12
    - phi_jl
    - theta_jn
    - luminosity_distance
    - geocent_time
    - ra
    - dec
    - psi
  standardization_transforms:
    - _target_: dingo.gw.transforms.SampleExtrinsicParameters
      extrinsic_prior_dict: ${data.extrinsic_prior}
    - _target_: dingo.gw.transforms.GetDetectorTimes
      ifo_list:
        _target_: bilby.gw.detector.InterferometerList
        interferometers: ${data.detectors}
      ref_time: ${data.ref_time}
    - ${data.gnpe_time_shifts}
  transforms:
    - _target_: dingo.gw.transforms.SampleExtrinsicParameters
      extrinsic_prior_dict: ${data.extrinsic_prior}
    - _target_: dingo.gw.transforms.GetDetectorTimes
      ifo_list:
        _target_: bilby.gw.detector.InterferometerList
        interferometers: ${data.detectors}
      ref_time: ${data.ref_time}
    - ${data.gnpe_time_shifts}
    - _target_: dingo.gw.transforms.ProjectOntoDetectors
      _partial_: true
      _runtime_dependencies_: [domain]
      ifo_list:
        _target_: bilby.gw.detector.InterferometerList
        interferometers: ${data.detectors}
      ref_time: ${data.ref_time}
    - _target_: dingo.gw.transforms.SampleNoiseASD
      _partial_: true
      _runtime_dependencies_: [asd_dataset]
    - _target_: dingo.gw.transforms.WhitenAndScaleStrain
      _partial_: true
      _runtime_dependencies_: [domain]
    - _target_: dingo.gw.transforms.AddWhiteNoiseComplex
    - _target_: dingo.gw.transforms.SelectStandardizeRepackageParameters
      parameters_dict:
        inference_parameters: ${data.inference_parameters}
        context_parameters: ${data.context_parameters}
      standardization_dict: ${data.standardization}
    - _target_: dingo.gw.transforms.RepackageStrainsAndASDS
      _partial_: true
      _runtime_dependencies_: [domain]
      ifos: ${data.detectors}
    - _target_: dingo.gw.transforms.UnpackDict
      selected_keys: ${data.selected_keys}

training:
  stage_0:
    epochs: 300
    asd_dataset:
      _target_: dingo.gw.noise.asd_dataset.ASDDataset
      file_name: training_data/asd_dataset_fiducial/asds_O1_fiducial.hdf5
      ifos: ${data.detectors}
      precision: single
      domain_update: null
    freeze_rb_layer: true
    batch_size: 4096
    early_stopping: null
    optimizer:
      lr: 5.0e-5
    scheduler:
      T_max: 300
  stage_1:
    epochs: 150
    asd_dataset:
      _target_: dingo.gw.noise.asd_dataset.ASDDataset
      file_name: training_data/asd_dataset/asds_O1.hdf5
      ifos: ${data.detectors}
      precision: single
      domain_update: null
    freeze_rb_layer: false
    batch_size: 4096
    early_stopping: null
    optimizer:
      _target_: torch.optim.Adam
      _partial_: true
      lr: 1.0e-5
    scheduler:
      _target_: torch.optim.lr_scheduler.CosineAnnealingLR
      _partial_: true
      T_max: 150

local:
  device: cuda
  num_workers: 32
  runtime_limits:
    max_time_per_run: 3600000
    max_epochs_per_run: 500
  checkpoint_epochs: 10
  leave_waveforms_on_disk: true
  condor:
    num_cpus: 16
    memory_cpus: 128000
    num_gpus: 1
    memory_gpus: 8000
    request_disk: 50GB

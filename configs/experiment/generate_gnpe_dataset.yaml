# @package _global_

defaults:
  - override /domain: uniform_frequency
  - override /waveform_generator: phenom_xphm
  - override /intrinsic_prior: precessing
  - _self_

num_samples: 5000000
compression:
  - _target_: dingo.gw.transforms.WhitenFixedASD
    _partial_: true
    _runtime_dependencies_: [domain]
    asd_file: aLIGO_ZERO_DET_high_P_asd.txt
    inverse: false
  - _target_: dingo.gw.SVD.ApplySVD
    svd_basis:
      _target_: dingo.gw.dataset.compression.train_svd_basis_from_waveforms
      _partial_: true
      _runtime_dependencies_:
        - waveform_generator
        - prior
        - num_processes
        - settings
        - compression_transforms
        - compression_settings
      size: 200
      num_training_samples: 50000
      num_validation_samples: 10000
out_file: training_data/waveform_dataset.hdf5

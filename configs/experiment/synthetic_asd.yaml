# @package _global_

parameterization_settings:
  num_spline_positions: 30
  num_spectral_segments: 400
  sigma: 0.14
  delta_f: -1
  smoothen: true
sampling_settings:
  bandwidth_spectral: 0.5
  bandwidth_spline: 0.25
  split_frequencies:
    - 30
    - 100
  rescaling_asd_paths:
    H1: /path/to/rescaling_asd_H1.hdf5
    L1: /path/to/rescaling_asd_L1.hdf5

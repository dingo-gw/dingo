# @package _global_

defaults:
  - override /extrinsic_prior: fmpe
  - override /model: fmpe
  - _self_

data:
  waveform_dataset:
    file_name: training_data/waveform_dataset.hdf5
    domain_update:
      f_min: 20.0
      f_max: 512.0
    svd_size_update: 150
  train_fraction: 0.95
  detectors: [H1, L1]
  ref_time: 1126259462.391
  inference_parameters:
    - chirp_mass
    - mass_ratio
    - a_1
    - a_2
    - tilt_1
    - tilt_2
    - phi_12
    - phi_jl
    - theta_jn
    - luminosity_distance
    - geocent_time
    - ra
    - dec
    - psi

training:
  evaluate: true
  stage_0:
    epochs: 400
    asd_dataset:
      _target_: dingo.gw.noise.asd_dataset.ASDDataset
      file_name: training_data/asd_dataset_fiducial/asds_O1_fiducial.hdf5
      ifos: ${data.detectors}
      precision: single
      domain_update: null
    freeze_rb_layer: true
    batch_size: 4096
    early_stopping: null
    optimizer:
      lr: 0.0005
    scheduler:
      T_max: 400
  stage_1:
    epochs: 100
    asd_dataset:
      _target_: dingo.gw.noise.asd_dataset.ASDDataset
      file_name: training_data/asd_dataset/asds_O1.hdf5
      ifos: ${data.detectors}
      precision: single
      domain_update: null
    freeze_rb_layer: true
    batch_size: 4096
    early_stopping: null
    optimizer:
      _target_: torch.optim.Adam
      _partial_: true
      lr: 1.0e-5
    scheduler:
      _target_: torch.optim.lr_scheduler.CosineAnnealingLR
      _partial_: true
      T_max: 100

local:
  device: cuda
  num_workers: 31
  runtime_limits:
    max_time_per_run: 360000
    max_epochs_per_run: 500
  checkpoint_epochs: 200
  leave_waveforms_on_disk: true

_target_: dingo.core.posterior_models.NormalizingFlowPosteriorModel
posterior_kwargs:
  num_flow_steps: 5
  base_transform_kwargs:
    hidden_dim: 64
    num_transform_blocks: 5
    activation: elu
    dropout_probability: 0.0
    batch_norm: true
    num_bins: 8
    base_transform_type: rq-coupling
